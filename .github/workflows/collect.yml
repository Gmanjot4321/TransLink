name: Poll TransLink feed

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll feed and store snapshot
        env:
          TRANSLINK_API_KEY: ${{ secrets.TRANSLINK_API_KEY }}
        run: python poll_once.py

      - name: Commit and push updated CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snapshots.csv
          git diff --quiet --cached || git commit -m "Add polling snapshot"
          git push